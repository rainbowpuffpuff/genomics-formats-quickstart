name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run genomics format inspection
        run: python scripts/inspect_genomics_formats.py

      - name: Run smoke tests
        run: pytest tests/

      - name: Upload outputs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: outputs/

      - name: Check outputs exist
        run: |
          test -f outputs/fastq_summary.json
          test -f outputs/bam_summary.json
          test -f outputs/vcf_summary_basic_vcf.json
          echo "All expected outputs produced."
